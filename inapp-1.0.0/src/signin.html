<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <title>Iniciar sesión - Sanos y Salvos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon_io/favicon-16x16.png">
  <link rel="manifest" href="./assets/images/favicon_io/site.webmanifest">
</head>

<body>

  <div class="container d-flex align-items-center justify-content-center min-vh-100">
    <div class="card shadow-sm border-0" style="max-width:420px; width:100%;">
      <div class="card-body p-5">

        <div class="text-center mb-4">
          <a href="index.html" class="mb-4 d-inline-flex align-items-center text-decoration-none">
            <img src="./assets/images/logo-icon.svg" alt="" width="36">
            <span class="ms-2 fw-bold fs-5 text-dark">Sanos y Salvos</span>
          </a>

          <h1 class="card-title mb-2 h5">Iniciar sesión</h1>
          <p class="text-secondary small mb-0">
            Ingresa tus datos para acceder al sistema de búsqueda de mascotas perdidas.
          </p>
        </div>

        <form class="needs-validation mt-3" novalidate>
          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico</label>
            <input id="email" type="email" class="form-control" placeholder="usuario@sanosysalvos.cl" required autofocus>
            <div class="invalid-feedback">Ingresa un correo válido.</div>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label d-flex justify-content-between">
              <span>Contraseña</span>
              <a href="#" class="small link-primary">¿Olvidaste tu contraseña?</a>
            </label>
            <input id="password" type="password" class="form-control" placeholder="Ingresa tu contraseña" required minlength="6">
            <div class="invalid-feedback">La contraseña debe tener al menos 6 caracteres.</div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="form-check">
              <input id="remember" class="form-check-input" type="checkbox">
              <label class="form-check-label small" for="remember">Recordarme</label>
            </div>
          </div>

          <button class="btn btn-primary w-100" type="submit">
            Ingresar
          </button>
        </form>

        <div class="text-center mt-3 small text-muted">
          ¿No tienes una cuenta?
          <a href="signup.html" class="link-primary">Crear cuenta</a>
        </div>

        <div class="text-center mt-4">
          <a href="index.html" class="small text-secondary">
            Volver al dashboard
          </a>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="./assets/js/main.js" type="module"></script>

</body>

</html>
